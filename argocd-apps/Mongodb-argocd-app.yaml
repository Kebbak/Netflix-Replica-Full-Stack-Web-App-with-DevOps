apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netflix-clone
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Kebba91/Netflix-Clone'
    targetRevision: DevOps
    path: k8s-manifest
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true