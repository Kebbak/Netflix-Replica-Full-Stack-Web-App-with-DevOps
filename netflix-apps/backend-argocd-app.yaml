apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netflix-clone-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Kebba91/Netflix-Replica-Full-Stack-Web-App-with-DevOps'
    targetRevision: main
    path: K8s-Manifests/backend
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true