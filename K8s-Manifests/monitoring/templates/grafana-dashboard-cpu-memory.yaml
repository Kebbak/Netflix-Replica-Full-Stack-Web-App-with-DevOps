apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cpu-memory
  namespace: monitoring
data:
  cpu-memory-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "CPU & Memory Usage",
        "panels": [
          {
            "type": "graph",
            "title": "CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)",
                "format": "time_series"
              }
            ]
          },
          {
            "type": "graph",
            "title": "Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes) by (pod)",
                "format": "time_series"
              }
            ]
          }
        ]
      }
    }