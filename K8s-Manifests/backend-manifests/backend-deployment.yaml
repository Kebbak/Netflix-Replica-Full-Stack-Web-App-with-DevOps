apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: netflix-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 050752619291.dkr.ecr.us-east-1.amazonaws.com/netflix-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
