#create  a new file named backend-ci.yaml in the .github/workflows directory
name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/Dockerfile'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set IMAGE tag
        run: echo "IMAGE=${{ secrets.ECR_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/netflix-backend:v1" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t $IMAGE ./backend

      - name: Push image to ECR
        run: docker push $IMAGE