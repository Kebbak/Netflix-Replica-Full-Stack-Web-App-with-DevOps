apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netflix-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Kebba91/Netflix-Replica-Full-Stack-Web-App-with-DevOps'
    targetRevision: main
    path: netflix-apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true